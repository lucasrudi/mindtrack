sonar.projectKey=lucasrudi_mindtrack
sonar.projectName=MindTrack
sonar.organization=lucasrudi

# Sources
sonar.sources=backend/src/main/java,frontend/src
sonar.tests=backend/src/test/java,frontend/src
sonar.test.inclusions=**/*Test.java,**/*.spec.ts,**/*.test.ts

# Java
sonar.java.binaries=backend/target/classes
sonar.java.source=21
sonar.java.coveragePlugin=jacoco
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml

# JavaScript/TypeScript/Vue
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/target/**,**/*.config.*,**/db/migration/**,scripts/**
sonar.coverage.exclusions=**/model/**,**/dto/**,**/config/**,**/*Application.java

# Quality Gate — wait for gate result and fail CI if not met
# Gate thresholds are configured in SonarCloud UI; see docs/sonar-quality-gates.md
sonar.qualitygate.wait=true

# Terraform
sonar.terraform.provider.aws.version=6.35.1

# Duplication
sonar.cpd.exclusions=**/model/**,**/dto/**

# Issue thresholds reported in analysis (informational; gate enforced in SonarCloud UI)
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=java:S1192
sonar.issue.ignore.multicriteria.e1.resourceKey=**/db/migration/**
