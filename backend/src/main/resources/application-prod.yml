spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}

logging:
  level:
    com.mindtrack: INFO

sentry:
  dsn: ${SENTRY_DSN}
  environment: production
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.05}

mindtrack:
  ai:
    api-key: ${CLAUDE_API_KEY}
