spring:
  application:
    name: mindtrack

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  metrics:
    tags:
      application: mindtrack
    distribution:
      percentiles-histogram:
        http.server.requests: true
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 5s
  tracing:
    sampling:
      probability: ${OTEL_SAMPLING_PROBABILITY:1.0}
  otlp:
    metrics:
      export:
        url: ${OTEL_EXPORTER_OTLP_METRICS_ENDPOINT:http://localhost:4318/v1/metrics}
        step: ${OTEL_METRICS_EXPORT_STEP:30s}
        enabled: ${OTEL_METRICS_ENABLED:false}
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_TRACES_ENDPOINT:http://localhost:4318/v1/traces}
      export:
        enabled: ${OTEL_TRACING_ENABLED:false}

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:0.1}
  send-default-pii: false
  logging:
    minimum-event-level: ERROR
    minimum-breadcrumb-level: WARN
  ignored-exceptions-for-type:
    - org.springframework.security.access.AccessDeniedException
    - org.springframework.security.core.AuthenticationException

mindtrack:
  auth:
    jwt-secret: ${JWT_SECRET:default-dev-secret-key-change-in-prod-256bit!}
    jwt-expiration-ms: ${JWT_EXPIRATION_MS:86400000}
    frontend-url: ${FRONTEND_URL:http://localhost:3000}
  ai:
    api-key: ${CLAUDE_API_KEY:dummy-key-for-local}
    api-url: https://api.anthropic.com/v1/messages
    model: claude-sonnet-4-20250514
    token-tiers:
      quick-checkin: 200
      coaching: 500
      session-summary: 1500
    cache:
      ttl-hours: 24
      max-size: 500
