# Docker Compose profile: enables OpenTelemetry export to local Grafana stack
spring:
  datasource:
    url: jdbc:mysql://mysql:3306/mindtrack
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: mindtrack
    password: mindtrack

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  cloud:
    aws:
      region:
        static: us-east-1
      credentials:
        access-key: local-dummy-access-key
        secret-key: local-dummy-secret-key
      s3:
        endpoint: http://localstack:4566
        path-style-access-enabled: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-dummy-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-dummy-client-secret}
            redirect-uri: "http://localhost:3000/api/login/oauth2/code/{registrationId}"

management:
  otlp:
    metrics:
      export:
        url: http://otel-collector:4318/v1/metrics
        step: 15s
        enabled: true
    tracing:
      endpoint: http://otel-collector:4318/v1/traces
      export:
        enabled: true
  tracing:
    sampling:
      probability: 1.0

mindtrack:
  ai:
    whisper-api-url: https://api.openai.com/v1/audio/transcriptions
    whisper-api-key: ${OPENAI_API_KEY:dummy-key-for-local}

logging:
  level:
    com.mindtrack: DEBUG

sentry:
  dsn: ""
  environment: docker
