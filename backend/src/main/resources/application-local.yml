spring:
  datasource:
    url: jdbc:h2:mem:mindtrack;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: local-dummy-client-id
            client-secret: local-dummy-client-secret

logging:
  level:
    com.mindtrack: DEBUG
    org.hibernate.SQL: DEBUG
