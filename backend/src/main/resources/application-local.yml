spring:
  datasource:
    url: jdbc:h2:mem:mindtrack;DB_CLOSE_DELAY=-1;MODE=MYSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  flyway:
    enabled: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: local-dummy-client-id
            client-secret: local-dummy-client-secret

logging:
  level:
    com.mindtrack: DEBUG
    org.hibernate.SQL: DEBUG

# OpenTelemetry disabled by default in local (enable via OTEL_METRICS_ENABLED=true)
management:
  otlp:
    metrics:
      export:
        enabled: false
    tracing:
      export:
        enabled: false

mindtrack:
  auth:
    jwt-secret: local-dev-secret-key-for-testing-purposes-only-minimum-256-bits!
    frontend-url: http://localhost:3000
  ai:
    api-key: dummy-key-for-local
    model: claude-sonnet-4-20250514
