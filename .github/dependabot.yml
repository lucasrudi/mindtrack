version: 2

updates:
  # Backend — Maven
  - package-ecosystem: "maven"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      backend-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "chore(backend)"

  # Frontend — npm
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      frontend-dependencies:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - "version-update:semver-major"
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "chore(frontend)"

  # Infrastructure — Terraform
  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      infra-dependencies:
        patterns:
          - "*"
    labels:
      - "dependencies"
      - "infra"
    commit-message:
      prefix: "chore(infra)"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    groups:
      actions-dependencies:
        patterns:
          - "*"
        # Exclude actions used in code-review.yml to prevent OIDC validation
        # failures. anthropics/claude-code-action@v1 validates that
        # code-review.yml is identical to main at runtime — any PR modifying
        # that file will always fail Code Review. Manage these manually.
        exclude-patterns:
          - "anthropics/claude-code-action"
          - "actions/checkout"
    ignore:
      - dependency-name: "anthropics/claude-code-action"
      - dependency-name: "actions/checkout"
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore(ci)"
