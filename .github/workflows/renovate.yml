name: Renovate

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  renovate:
    name: Renovate Dependency Updates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Run Renovate
        uses: renovatebot/github-action@v46.1.4
        with:
          token: ${{ secrets.GH_CONFIG_TOKEN }}
          configurationFile: renovate.json
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: debug

  cleanup-orphan-branches:
    name: Delete Renovate Branches Without Open PRs
    runs-on: ubuntu-latest
    needs: renovate
    if: always()
    steps:
      - name: Delete orphan renovate branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scanning for orphan renovate branches..."
          gh api repos/${{ github.repository }}/branches \
            --paginate \
            --jq '.[].name | select(startswith("renovate/"))' | \
          while read -r branch; do
            pr_count=$(gh pr list \
              --repo "${{ github.repository }}" \
              --head "$branch" \
              --state open \
              --json number \
              --jq 'length')
            if [ "$pr_count" = "0" ]; then
              echo "Deleting orphan branch: $branch"
              gh api repos/${{ github.repository }}/git/refs/heads/$branch \
                --method DELETE
            else
              echo "Keeping branch (has open PR): $branch"
            fi
          done
          echo "Cleanup complete."
