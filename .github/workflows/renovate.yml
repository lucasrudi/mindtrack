name: Renovate

on:
  schedule:
    - cron: '0 6 * * *'  # Daily 06:00 UTC
  workflow_dispatch:

jobs:
  renovate:
    name: Renovate Dependency Updates
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Run Renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          token: ${{ secrets.GH_CONFIG_TOKEN }}
          configurationFile: renovate.json
        env:
          RENOVATE_REPOSITORIES: ${{ github.repository }}
          LOG_LEVEL: debug

  cleanup-orphan-branches:
    name: Delete Renovate Branches Without Open PRs
    runs-on: ubuntu-latest
    needs: renovate
    if: always()
    permissions:
      contents: write
    steps:
      - name: Delete orphan renovate branches
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scanning for orphan renovate branches..."
          gh api repos/${{ github.repository }}/branches \
            --paginate \
            --jq '.[].name | select(startswith("renovate/"))' | \
          while read -r branch; do
            pr_count=$(gh pr list \
              --repo "${{ github.repository }}" \
              --head "$branch" \
              --state open \
              --json number \
              --jq 'length')
            if [ "$pr_count" = "0" ]; then
              echo "Deleting orphan branch: $branch"
              gh api repos/${{ github.repository }}/git/refs/heads/$branch \
                --method DELETE
            else
              echo "Keeping branch (has open PR): $branch"
            fi
          done
          echo "Cleanup complete."
