name: Verify

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  backend-verify:
    name: Backend Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        working-directory: backend
        run: mvn verify -B

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  frontend-verify:
    name: Frontend Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npx eslint . --max-warnings 0

      - name: Unit tests
        working-directory: frontend
        run: npm run test:unit -- --run --coverage

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: frontend-coverage
          path: frontend/coverage/

  infra-verify:
    name: Infrastructure Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4

      - name: Run tflint
        working-directory: infra
        run: tflint --recursive

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-verify, frontend-verify]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Snyk test backend
        working-directory: backend
        run: snyk test --file=pom.xml --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Snyk test frontend
        working-directory: frontend
        run: snyk test --file=package.json --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-verify, frontend-verify]
    if: needs.backend-verify.result == 'success' && needs.frontend-verify.result == 'success'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        if: needs.backend-verify.result == 'success'
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        if: needs.frontend-verify.result == 'success'
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
