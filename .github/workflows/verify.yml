name: Verify

on:
  push:
    branches:
      - main

jobs:
  backend-verify:
    name: Backend Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        working-directory: backend
        run: mvn clean verify -B

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7.6.2
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  frontend-verify:
    name: Frontend Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 20
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v6.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm run test:coverage

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v7.6.2
        with:
          name: frontend-coverage
          path: frontend/coverage/

  infra-verify:
    name: Infrastructure Verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: '1.7.0'

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Clean Terraform cache
        working-directory: infra
        run: rm -rf .terraform

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@115085cc23c5f5eeebad58ba418ec14e88c7a431 # v6.0.0

      - name: Init tflint
        working-directory: infra
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: tflint --init

      - name: Run tflint
        working-directory: infra
        run: tflint --recursive --minimum-failure-severity=error

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          working_directory: infra

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    needs: [backend-verify, frontend-verify]
    if: needs.backend-verify.result == 'success' && needs.frontend-verify.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Download frontend coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v8.3.0
        continue-on-error: true
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: Download backend coverage
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v8.3.0
        continue-on-error: true
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

      - name: SonarCloud Scan
        id: sonar
        continue-on-error: true
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Check SonarCloud Quality Gate
        if: always()
        run: |
          if [ "${{ steps.sonar.outcome }}" = "success" ]; then
            echo "CI scan completed. Quality gate enforced by scanner."
            exit 0
          fi
          STATUS=$(curl -s \
            "https://sonarcloud.io/api/qualitygates/project_status?projectKey=lucasrudi_mindtrack" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('projectStatus',{}).get('status','UNKNOWN'))" 2>/dev/null || echo "UNKNOWN")
          echo "SonarCloud quality gate: $STATUS"
          if [ "$STATUS" = "ERROR" ]; then
            echo "::error::SonarCloud quality gate FAILED"
            exit 1
          elif [ "$STATUS" = "OK" ] || [ "$STATUS" = "NONE" ]; then
            echo "::notice::CI scan skipped (Automatic Analysis conflict). Quality gate OK."
            exit 0
          else
            echo "::error::Quality gate status unknown: $STATUS"
            exit 1
          fi
