name: Deploy

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  detect-component:
    name: Detect Component
    runs-on: ubuntu-latest
    outputs:
      component: ${{ steps.detect.outputs.component }}
    steps:
      - name: Detect component from release tag
        id: detect
        run: |
          TAG="${{ github.event.release.tag_name }}"
          if [[ "$TAG" == backend-* ]]; then
            echo "component=backend" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == frontend-* ]]; then
            echo "component=frontend" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG" == infra-* ]]; then
            echo "component=infra" >> "$GITHUB_OUTPUT"
          else
            echo "component=unknown" >> "$GITHUB_OUTPUT"
          fi

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'backend'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package
        working-directory: backend
        run: mvn package -DskipTests -B -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name mindtrack-prod-api \
            --zip-file fileb://backend/target/mindtrack-*.jar

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'frontend'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ vars.FRONTEND_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'backend'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate Javadoc
        working-directory: backend
        run: mvn javadoc:javadoc -q

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: backend/target/reports/apidocs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'infra'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var-file=environments/prod.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply tfplan
