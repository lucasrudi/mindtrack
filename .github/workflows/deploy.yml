name: Deploy

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to deploy (backend, frontend, infra)'
        required: true
        type: choice
        options: [backend, frontend, infra]

jobs:
  detect-component:
    name: Detect Component
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      component: ${{ steps.detect.outputs.component }}
    steps:
      - name: Detect component from release tag or manual input
        id: detect
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "component=${{ inputs.component }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.event.release.tag_name }}"
            if [[ "$TAG" == backend-* ]]; then
              echo "component=backend" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == frontend-* ]]; then
              echo "component=frontend" >> "$GITHUB_OUTPUT"
            elif [[ "$TAG" == infra-* ]]; then
              echo "component=infra" >> "$GITHUB_OUTPUT"
            else
              echo "component=unknown" >> "$GITHUB_OUTPUT"
            fi
          fi

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'backend'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package
        working-directory: backend
        run: mvn clean package -DskipTests -B -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Configure backend Sentry environment
        env:
          LAMBDA_FUNCTION_NAME: mindtrack-prod-api
          SENTRY_SECRET_ID: mindtrack-prod/sentry_dsn
        run: |
          ENV_FILE="$(mktemp)"
          CURRENT_ENV_JSON=$(aws lambda get-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --query 'Environment.Variables' \
            --output json)
          SENTRY_DSN=$(aws secretsmanager get-secret-value \
            --secret-id "$SENTRY_SECRET_ID" \
            --query 'SecretString' \
            --output text)
          CURRENT_ENV_JSON="$CURRENT_ENV_JSON" SENTRY_DSN="$SENTRY_DSN" ENV_FILE="$ENV_FILE" python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          env = json.loads(os.environ["CURRENT_ENV_JSON"] or "{}")
          env["SENTRY_DSN"] = os.environ["SENTRY_DSN"]
          Path(os.environ["ENV_FILE"]).write_text(
              json.dumps({"Variables": env}, separators=(",", ":"))
          )
          PY
          aws lambda update-function-configuration \
            --function-name "$LAMBDA_FUNCTION_NAME" \
            --environment "file://$ENV_FILE"

      - name: Deploy to Lambda
        run: |
          aws lambda update-function-code \
            --function-name mindtrack-prod-api \
            --zip-file fileb://backend/target/mindtrack-*.jar

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'frontend'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node 20
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.1.0
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ vars.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT_FRONTEND }}
          SENTRY_RELEASE: ${{ github.event.release.tag_name }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_RELEASE: ${{ github.event.release.tag_name }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}
          VITE_APP_ENV: production
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Bootstrap deploy role permissions
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          ROLE_NAME="${AWS_ROLE_ARN##*/}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          POLICY_FILE="$(mktemp)"
          cat > "$POLICY_FILE" <<JSON
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "DeployWorkflowBootstrapRead",
                "Effect": "Allow",
                "Action": [
                  "cloudwatch:DescribeAlarms",
                  "cloudfront:GetCloudFrontOriginAccessIdentity",
                  "cloudfront:GetResponseHeadersPolicy",
                  "ec2:DescribeAddresses",
                  "ec2:DescribeAvailabilityZones",
                  "ec2:DescribeVpcs",
                  "events:DescribeRule",
                  "iam:GetRole",
                  "kms:DescribeKey",
                  "logs:DescribeLogGroups",
                  "s3:GetBucketPolicy",
                  "wafv2:GetWebACL"
                ],
                "Resource": "*"
              },
              {
                "Sid": "DeployWorkflowBootstrapS3Kms",
                "Effect": "Allow",
                "Action": [
                  "kms:Decrypt",
                  "kms:Encrypt",
                  "kms:GenerateDataKey"
                ],
                "Resource": "arn:aws:kms:*:${ACCOUNT_ID}:key/*"
              }
            ]
          }
          JSON
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "${ROLE_NAME}-deploy-bootstrap" \
            --policy-document "file://$POLICY_FILE"

      - name: Deploy to S3
        run: aws s3 sync frontend/dist/ s3://${{ vars.FRONTEND_BUCKET }}/ --delete

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

  deploy-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'backend'
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    permissions:
      contents: read
      id-token: write
      pages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Java 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Generate Javadoc
        working-directory: backend
        run: mvn javadoc:javadoc -q

      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload to Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: backend/target/reports/apidocs/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: detect-component
    if: needs.detect-component.outputs.component == 'infra'
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6.0.0
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Bootstrap deploy role permissions
        env:
          AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
        run: |
          ROLE_NAME="${AWS_ROLE_ARN##*/}"
          ACCOUNT_ID=$(aws sts get-caller-identity --query 'Account' --output text)
          POLICY_FILE="$(mktemp)"
          cat > "$POLICY_FILE" <<JSON
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "DeployWorkflowBootstrapRead",
                "Effect": "Allow",
                "Action": [
                  "cloudwatch:DescribeAlarms",
                  "cloudfront:GetCloudFrontOriginAccessIdentity",
                  "cloudfront:GetResponseHeadersPolicy",
                  "ec2:DescribeAddresses",
                  "ec2:DescribeAvailabilityZones",
                  "ec2:DescribeVpcs",
                  "events:DescribeRule",
                  "iam:GetRole",
                  "kms:DescribeKey",
                  "logs:DescribeLogGroups",
                  "s3:GetBucketPolicy",
                  "wafv2:GetWebACL"
                ],
                "Resource": "*"
              },
              {
                "Sid": "DeployWorkflowBootstrapS3Kms",
                "Effect": "Allow",
                "Action": [
                  "kms:Decrypt",
                  "kms:Encrypt",
                  "kms:GenerateDataKey"
                ],
                "Resource": "arn:aws:kms:*:${ACCOUNT_ID}:key/*"
              }
            ]
          }
          JSON
          aws iam put-role-policy \
            --role-name "$ROLE_NAME" \
            --policy-name "${ROLE_NAME}-deploy-bootstrap" \
            --policy-document "file://$POLICY_FILE"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: '1.7.0'

      - name: Clean Terraform cache
        working-directory: infra
        run: rm -rf .terraform

      - name: Terraform Init
        working-directory: infra
        run: terraform init

      - name: Terraform Plan
        working-directory: infra
        run: terraform plan -var-file=environments/prod.tfvars -out=tfplan

      - name: Terraform Apply
        working-directory: infra
        run: terraform apply tfplan
