name: Feature Branch CI

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'chore/**'
      - 'renovate/**'
  pull_request:
    branches:
      - main

permissions: {}

jobs:
  backend:
    name: Backend Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    if: >
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.modified, 'backend/') ||
      contains(github.event.head_commit.added, 'backend/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        working-directory: backend
        run: mvn verify -B

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

  frontend:
    name: Frontend Build & Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    if: >
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.modified, 'frontend/') ||
      contains(github.event.head_commit.added, 'frontend/')
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        continue-on-error: true
        run: npm run lint

      - name: Unit tests
        working-directory: frontend
        run: npm run test:unit -- --run --coverage

      - name: Build
        working-directory: frontend
        env:
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
          VITE_SENTRY_TRACES_SAMPLE_RATE: ${{ vars.VITE_SENTRY_TRACES_SAMPLE_RATE }}
          VITE_APP_ENV: ${{ vars.VITE_APP_ENV }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID }}
        run: npm run build

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        with:
          name: frontend-coverage
          path: frontend/coverage/

  infra:
    name: Terraform Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    if: >
      github.event_name == 'pull_request' ||
      contains(github.event.head_commit.modified, 'infra/') ||
      contains(github.event.head_commit.added, 'infra/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.7.0'

      - name: Terraform Format Check
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: infra
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6

      - name: Init tflint
        working-directory: infra
        run: tflint --init

      - name: Run tflint
        working-directory: infra
        run: tflint --recursive --minimum-failure-severity=error

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: infra
          soft_fail: true

  sonar:
    name: SonarCloud Analysis
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
      statuses: write
    needs: [backend, frontend]
    if: always() && (needs.backend.result == 'success' || needs.frontend.result == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download backend coverage
        uses: actions/download-artifact@v8
        if: needs.backend.result == 'success'
        with:
          name: backend-coverage
          path: backend/target/site/jacoco/

      - name: Download frontend coverage
        uses: actions/download-artifact@v8
        if: needs.frontend.result == 'success'
        with:
          name: frontend-coverage
          path: frontend/coverage/

      - name: SonarCloud Scan
        continue-on-error: true
        uses: SonarSource/sonarcloud-github-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
