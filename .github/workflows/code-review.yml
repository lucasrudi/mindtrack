name: Code Review

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

permissions:
  actions: read
  checks: read
  contents: read
  id-token: write
  pull-requests: write

jobs:
  run-review:
    name: Run Claude Review
    outputs:
      review_outcome: ${{ steps.metadata.outputs.review_outcome }}
      check_run_id: ${{ steps.metadata.outputs.check_run_id }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: review
        continue-on-error: true
        uses: anthropics/claude-code-action@905d4eb99ab3d43143d74fb0dcae537f29ac330a # v1.0.97
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GH_CONFIG_TOKEN }}
          allowed_bots: "dependabot[bot],renovate[bot]"
          prompt: |
            Review this pull request for the MindTrack application. Focus on:
            1. Correctness and potential bugs
            2. Security vulnerabilities (OWASP Top 10 — auth, injection, data exposure)
            3. Adherence to project conventions:
               - Java: Google Checkstyle, 4-space indent, 120-char line width
               - TypeScript/Vue: ESLint+Prettier, 2-space indent, no semicolons, single quotes
               - Terraform: terraform fmt style, tflint-clean
            4. Test coverage — are new behaviors tested?
            5. Performance — any obvious N+1 queries, blocking calls, or memory issues?

            Post your review as a single PR comment. Lead with a one-line summary verdict
            (LGTM / Minor issues / Major issues). List findings grouped by severity
            (Critical → High → Medium → Low). For each finding, include file, line range,
            and a concrete suggestion.

      - name: Capture review metadata
        id: metadata
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          CHECK_RUN_ID="$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}/jobs" --jq '.jobs[] | select(.name == "Run Claude Review") | .id' | head -n 1)"
          echo "check_run_id=$CHECK_RUN_ID" >> "$GITHUB_OUTPUT"
          echo "review_outcome=${{ steps.review.outcome }}" >> "$GITHUB_OUTPUT"

  review:
    name: Code Review
    runs-on: ubuntu-latest
    needs: run-review
    if: always()
    steps:
      - name: Check review outcome
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEW_JOB_RESULT: ${{ needs.run-review.result }}
          REVIEW_OUTCOME: ${{ needs.run-review.outputs.review_outcome }}
          CHECK_RUN_ID: ${{ needs.run-review.outputs.check_run_id }}
        run: |
          if [ "$REVIEW_JOB_RESULT" != "success" ]; then
            echo "Code review runner job failed before outcome validation."
            exit 1
          fi

          if [ "$REVIEW_OUTCOME" != "failure" ]; then
            echo "Code review completed successfully."
            exit 0
          fi

          if [ -n "$CHECK_RUN_ID" ]; then
            ANNOTATION_MESSAGES="$(gh api "repos/${GITHUB_REPOSITORY}/check-runs/${CHECK_RUN_ID}/annotations" --jq '.[].message' 2>/dev/null || true)"

            if printf '%s\n' "$ANNOTATION_MESSAGES" | grep -q "Credit balance is too low"; then
              echo "Skipping: Anthropic API credit balance is too low."
              exit 0
            fi
          fi

          echo "Code review failed for an unexpected reason."
          exit 1
