name: GitHub Config Sync

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  sync:
    name: Sync GitHub Repository Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Fetch GitHub token from Secrets Manager
        id: gh-token
        run: |
          TOKEN=$(aws secretsmanager get-secret-value \
            --secret-id mindtrack/github-config-token \
            --query SecretString --output text)
          echo "::add-mask::${TOKEN}"
          echo "value=${TOKEN}" >> $GITHUB_OUTPUT

      - name: Terraform Init
        working-directory: infra/github-settings
        env:
          GITHUB_TOKEN: ${{ steps.gh-token.outputs.value }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/github-settings
        env:
          GITHUB_TOKEN: ${{ steps.gh-token.outputs.value }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: |
          terraform plan \
            -var="repository_name=${{ github.event.repository.name }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/github-settings
        env:
          GITHUB_TOKEN: ${{ steps.gh-token.outputs.value }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: terraform apply tfplan
