name: GitHub Config Sync

on:
  push:
    branches: [main]
    paths:
      - 'infra/github-settings/**'
      - 'infra/modules/github/**'
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    name: Sync GitHub Repository Configuration
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4.0.0
        with:
          terraform_version: '1.7.0'

      - name: Clean Terraform cache
        working-directory: infra/github-settings
        run: rm -rf .terraform

      - name: Terraform Init
        working-directory: infra/github-settings
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONFIG_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/github-settings
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONFIG_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          TF_VAR_actions_secrets: ${{ format('{{\"GH_CONFIG_TOKEN\":\"{0}\"}}', secrets.GH_CONFIG_TOKEN) }}
        run: |
          terraform plan \
            -var="repository_name=${{ github.event.repository.name }}" \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/github-settings
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONFIG_TOKEN }}
          GITHUB_OWNER: ${{ github.repository_owner }}
          TF_VAR_actions_secrets: ${{ format('{{\"GH_CONFIG_TOKEN\":\"{0}\"}}', secrets.GH_CONFIG_TOKEN) }}
        run: terraform apply tfplan
