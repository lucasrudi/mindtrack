name: GitHub Config Sync

on:
  schedule:
    # Run daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: read

jobs:
  sync:
    name: Sync GitHub Repository Configuration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.7.0'

      - name: Terraform Init
        working-directory: infra/modules/github
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONFIG_TOKEN }}
        run: terraform init

      - name: Terraform Plan
        working-directory: infra/modules/github
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONFIG_TOKEN }}
        run: |
          terraform plan \
            -var="repository_name=${{ github.event.repository.name }}" \
            -var='repository_description=Personal mental health tracking application' \
            -var='topics=["mental-health","spring-boot","vue","terraform","aws"]' \
            -out=tfplan

      - name: Terraform Apply
        working-directory: infra/modules/github
        env:
          GITHUB_TOKEN: ${{ secrets.GH_CONFIG_TOKEN }}
        run: terraform apply tfplan
