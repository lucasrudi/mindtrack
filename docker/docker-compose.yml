version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - '8080:8080'
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
    depends_on:
      - mysql
      - otel-collector
    networks:
      - mindtrack

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - '3000:80'
    depends_on:
      - backend
    networks:
      - mindtrack

  mysql:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: mindtrack
      MYSQL_DATABASE: mindtrack
      MYSQL_USER: mindtrack
      MYSQL_PASSWORD: mindtrack
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mindtrack

  localstack:
    image: localstack/localstack:3
    ports:
      - '4566:4566'
    environment:
      - SERVICES=s3,secretsmanager
      - DEFAULT_REGION=us-east-1
    networks:
      - mindtrack

  # ── Observability Stack ─────────────────────────────────────────

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ['--config=/etc/otel-collector-config.yml']
    ports:
      - '4317:4317' # OTLP gRPC
      - '4318:4318' # OTLP HTTP
      - '8889:8889' # Prometheus exporter
    volumes:
      - ./otel/otel-collector-config.yml:/etc/otel-collector-config.yml:ro
    depends_on:
      - tempo
    networks:
      - mindtrack

  prometheus:
    image: prom/prometheus:v2.54.1
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-remote-write-receiver'
    depends_on:
      - otel-collector
    networks:
      - mindtrack

  tempo:
    image: grafana/tempo:2.6.1
    ports:
      - '3200:3200' # Tempo HTTP API
    volumes:
      - ./tempo/tempo.yml:/etc/tempo/tempo.yml:ro
      - tempo_data:/var/tempo
    command: ['-config.file=/etc/tempo/tempo.yml']
    networks:
      - mindtrack

  grafana:
    image: grafana/grafana:11.4.0
    ports:
      - '3001:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: mindtrack
      GF_USERS_ALLOW_SIGN_UP: 'false'
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/mindtrack-overview.json
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
      - tempo
    networks:
      - mindtrack

volumes:
  mysql_data:
  prometheus_data:
  tempo_data:
  grafana_data:

networks:
  mindtrack:
    driver: bridge
