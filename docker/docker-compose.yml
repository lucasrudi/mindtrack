version: '3.8'

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
    depends_on:
      - mysql
    networks:
      - mindtrack

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - mindtrack

  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mindtrack
      MYSQL_DATABASE: mindtrack
      MYSQL_USER: mindtrack
      MYSQL_PASSWORD: mindtrack
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - mindtrack

  localstack:
    image: localstack/localstack:3
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3,secretsmanager
      - DEFAULT_REGION=us-east-1
    networks:
      - mindtrack

volumes:
  mysql_data:

networks:
  mindtrack:
    driver: bridge
