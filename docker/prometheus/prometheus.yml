global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8889']

  - job_name: spring-boot
    metrics_path: /actuator/prometheus
    scrape_interval: 10s
    static_configs:
      - targets: ['backend:8080']
